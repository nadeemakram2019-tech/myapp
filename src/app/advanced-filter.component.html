@if (isOpen) {
  <!-- Backdrop to close the filter when clicking outside -->
  <div class="fixed inset-0 bg-gray-900/40 backdrop-blur-sm z-[10009] transition-opacity" (click)="onClose()"></div>

  <div class="fixed top-0 right-0 h-full w-80 bg-white shadow-2xl z-[10010] flex flex-col" style="transform: none;">
    <div class="flex items-center justify-between px-5 py-4 border-b border-gray-100">
      <div class="flex items-center gap-2">
        <lucide-icon name="sliders-horizontal" class="w-4 h-4 text-blue-600"></lucide-icon>
        <span class="font-semibold text-gray-900">Advanced Filters</span>
      </div>
      <button class="text-gray-400 hover:text-gray-700" (click)="onClose()">
        <lucide-icon name="x" class="w-5 h-5"></lucide-icon>
      </button>
    </div>
    <div class="flex-1 overflow-y-auto">
      <div class="flex flex-col gap-0 overflow-hidden">
        <div class="flex-1 overflow-y-auto">
          <div>
            <button class="w-full flex items-center justify-between px-4 py-2.5 text-xs font-semibold text-gray-500 uppercase tracking-wider hover:bg-gray-50">
              <span>Advanced Filters</span>
              <lucide-icon name="chevron-up" class="w-3.5 h-3.5"></lucide-icon>
            </button>
            <div class="px-3 pb-3 space-y-3">
              <div class="bg-gray-50 border border-gray-200 rounded-lg p-2.5 space-y-2 relative">
                <div class="flex items-center justify-between mb-1">
                  <span class="text-xs font-medium text-gray-500">Rule 1</span>
                  <button class="text-gray-400 hover:text-red-500">
                    <lucide-icon name="x" class="w-3.5 h-3.5"></lucide-icon>
                  </button>
                </div>
                <button type="button" role="combobox" aria-controls="radix-:r10:" aria-expanded="false" aria-autocomplete="none" dir="ltr" data-state="closed" class="flex w-full items-center justify-between whitespace-nowrap rounded-md border border-input px-3 py-2 shadow-sm ring-offset-background data-[placeholder]:text-muted-foreground focus:outline-none focus:ring-1 focus:ring-ring disabled:cursor-not-allowed disabled:opacity-50 [&>span]:line-clamp-1 h-7 text-xs bg-white">
                  <span style="pointer-events: none;">Bill Number</span>
                  <lucide-icon name="chevron-down" class="h-4 w-4 opacity-50"></lucide-icon>
                </button>
                <button type="button" role="combobox" aria-controls="radix-:r11:" aria-expanded="false" aria-autocomplete="none" dir="ltr" data-state="closed" class="flex w-full items-center justify-between whitespace-nowrap rounded-md border border-input px-3 py-2 shadow-sm ring-offset-background data-[placeholder]:text-muted-foreground focus:outline-none focus:ring-1 focus:ring-ring disabled:cursor-not-allowed disabled:opacity-50 [&>span]:line-clamp-1 h-7 text-xs bg-white">
                  <span style="pointer-events: none;">Contains</span>
                  <lucide-icon name="chevron-down" class="h-4 w-4 opacity-50"></lucide-icon>
                </button>
                <input type="text" class="flex w-full rounded-md border border-input px-3 py-1 shadow-sm transition-colors file:border-0 file:bg-transparent file:text-sm file:font-medium file:text-foreground placeholder:text-muted-foreground focus-visible:outline-none focus-visible:ring-1 focus-visible:ring-ring disabled:cursor-not-allowed disabled:opacity-50 md:text-sm h-7 text-xs bg-white" placeholder="Value..." value="">
              </div>
              <button class="inline-flex items-center justify-center gap-2 whitespace-nowrap font-medium transition-colors focus-visible:outline-none focus-visible:ring-1 focus-visible:ring-ring disabled:pointer-events-none disabled:opacity-50 [&_svg]:pointer-events-none [&_svg]:size-4 [&_svg]:shrink-0 border bg-background shadow-sm hover:text-accent-foreground rounded-md px-3 w-full h-8 text-xs border-dashed border-blue-300 text-blue-600 hover:bg-blue-50">
                <lucide-icon name="plus" class="w-3 h-3 mr-1"></lucide-icon>
                Add Filter Rule
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>
    <div class="p-4 border-t border-gray-100 flex gap-2">
      <button (click)="onClose()" class="inline-flex items-center justify-center gap-2 whitespace-nowrap rounded-md font-medium transition-colors focus-visible:outline-none focus-visible:ring-1 focus-visible:ring-ring disabled:pointer-events-none disabled:opacity-50 [&_svg]:pointer-events-none [&_svg]:size-4 [&_svg]:shrink-0 shadow h-9 px-4 py-2 flex-1 text-sm bg-blue-600 hover:bg-blue-700 text-white">Apply</button>
    </div>
  </div>
}
